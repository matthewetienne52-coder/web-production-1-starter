<html>

<head>
	<link rel="stylesheet" type="text/css" href="style.css">
	<!-- References a style sheet within the same folder to change how the page looks -->
	<h1>Class 3</h1>

</head>
<body>
	<p> This page (hopefully) has a background, white text and custom font after referencing a style sheet.
	</p>
	<div class="notification"> <!-- creates a unique div called calss, can be specially modified (check style.css)-->
		Yo
	</div>
	<p class="notification">
		This is a paragraph with the notification class
		<!-- The rules of a paragraph can be overridden using unique class modifiers-->
	</p>
	<p id="aqua">
		This is an aqua colored paragraph
	</p>
	<!-- IDs, unlike class, can only be used once per page-->
	<ul>
		<li>This is a bullet point</li>
		<li>This is a bullet point</li>
		<li>This is a bullet point</li>
		<!-- these can also accept class and id modifiers btw-->
	</ul>

</body>
</html>
